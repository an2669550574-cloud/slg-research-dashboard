name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile-check (no syntax errors)
        run: python -m compileall app tests

      - name: Run pytest
        env:
          USE_MOCK_DATA: "true"
          API_KEY: ""
          CORS_ORIGINS: "*"
        run: pytest -v

      - name: Alembic migration smoke test
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./_ci_alembic.db"
        run: |
          python -m alembic --config alembic.ini upgrade head
          python -m alembic --config alembic.ini downgrade base
          rm -f _ci_alembic.db

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + production build
        run: npm run build
