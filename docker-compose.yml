version: '3.9'

services:
  backend:
    build: ./backend
    container_name: slg_backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/slg_research.db

  frontend:
    build: ./frontend
    container_name: slg_frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
